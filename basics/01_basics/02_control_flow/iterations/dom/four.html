<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style = "background-color: #212121; color:#fff;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addlanguage(langname){
        const li = document.createElement('li')
        li.innerHTML = langname
        document.querySelector(".language").appendChild(li)
    }

    addlanguage("python")
    addlanguage("typescript")


     function addOptiLanguage(langName){
        const li = document.createElement("li")
        li.appendChild(document.createTextNode(langName))
        document.querySelector(".language").appendChild(li)
    }

    addOptiLanguage("golang")


    // EDIT

    const secondLang = document.querySelector("li:nth-child(3)")
secondLang.innerHTML = "Java"

document.querySelector("li:nth-child(2)")
.replaceWith(document.createElement("li"))

document.querySelector("li:nth-child(2)").innerHTML = "C++"


// remove
const second = document.querySelector("li:nth-child(2)")
second.remove()

</script>
