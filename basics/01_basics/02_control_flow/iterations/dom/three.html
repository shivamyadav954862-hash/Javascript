<!DOCTYPE html>
 <html lang="en"> 
    <head>
         <meta charset="UTF-8">
          <meta name="viewport"
           content="width=device-width, initial-scale=1.0"> 
           <title>DOM</title> 
        </head> 
        <body style="background-color: #212121; color:#fff;">
        </body>

<script>
    const div = document.createElement('div')
    console.log(div);

    div.className = "main"
    div.id = Math.random() * 10 + 1
    div.setAttribute("title", "generate title")
    div.style.backgroundColor = "green"
    div.style.padding = "10px"

    const add = document.createTextNode("Shivam yadav")
    div.appendChild(add)

    document.body.appendChild(div)
</script>


<!-- 
Final flow 
div banaya
usko style diya
usme text dala
body me add kiya -->

<!-- 
createElement → element banata hai
createTextNode → text banata hai
appendChild → andar add karta hai
body.appendChild → screen pe dikhata hai -->
